name: Publish to Artifactory

on:
  workflow_dispatch:

jobs:
  publish-artifactory:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      JF_URL: ${{ vars.JF_URL }}
      JF_PYPI_REPO: ${{ vars.JF_PYPI_REPO }}
      JF_OIDC_PROVIDER: ${{ vars.JF_OIDC_PROVIDER }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.11"
          enable-cache: false

      - name: Install dependencies
        run: scripts/install

      - name: Build package
        run: |
          uv build
          uv run twine check dist/*

      - name: Setup JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        with:
          oidc-provider-name: ${{ env.JF_OIDC_PROVIDER }}

      - name: Upload distributions to Artifactory
        run: jf rt upload "dist/*" "${JF_PYPI_REPO}/" --flat=true
