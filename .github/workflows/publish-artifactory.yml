name: Publish to Artifactory

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build only; skip Artifactory upload"
        type: boolean
        default: false
  push:
    paths:
      - .github/workflows/publish-artifactory.yml

jobs:
  publish-artifactory:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.11"
          enable-cache: false

      - name: Install dependencies
        run: scripts/install

      - name: Build package
        run: |
          uv build
          uv run twine check dist/*

      - name: Setup JFrog CLI (OIDC)
        if: ${{ !inputs.dry-run }}
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JF_URL }}
        with:
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER }}
          oidc-audience: github-actions

      - name: Upload distributions to Artifactory
        if: ${{ !inputs.dry-run }}
        run: |
          jf rt upload \
            "dist/(*)" \
            "${{ vars.JF_PYPI_REPO }}/uvicorn/{1}"
