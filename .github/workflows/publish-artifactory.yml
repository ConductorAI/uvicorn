name: Publish to Artifactory

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build only; skip Artifactory upload"
        type: boolean
        default: false
  push:
    paths:
      - .github/workflows/publish-artifactory.yml

jobs:
  publish-artifactory:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.11"
          enable-cache: false

      - name: Install dependencies
        run: scripts/install

      - name: Stamp local version identifier
        run: |
          BASE=$(python -c "import re,pathlib; print(re.search(r'__version__ = \"([^\"]+)\"', pathlib.Path('uvicorn/__init__.py').read_text()).group(1))")
          LOCAL="${BASE}+cai.${{ github.run_number }}"
          echo "Building ${LOCAL}"
          sed -i "s/__version__ = \"${BASE}\"/__version__ = \"${LOCAL}\"/" uvicorn/__init__.py

      - name: Build package
        run: |
          uv build
          uv run twine check dist/*

      - name: Setup JFrog CLI (OIDC)
        if: ${{ !inputs.dry-run }}
        uses: jfrog/setup-jfrog-cli@5a4fbe1e30dbb570cc62d2513421c4b9bc3c9959 # v4.10.1
        env:
          JF_URL: ${{ vars.JF_URL }}
        with:
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER }}
          oidc-audience: github-actions

      - name: Upload distributions to Artifactory
        if: ${{ !inputs.dry-run }}
        env:
          JF_PYPI_REPO: ${{ vars.JF_PYPI_REPO }}
          JFROG_CLI_BUILD_NAME: uvicorn
          JFROG_CLI_BUILD_NUMBER: ${{ github.run_number }}
          JFROG_CLI_BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          jf rt upload \
            "dist/(*)" \
            "${JF_PYPI_REPO}/uvicorn/{1}"
          jf rt build-add-git
          jf rt build-collect-env
          jf rt build-publish
